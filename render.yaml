services:
  - type: web
    name: boa-club-api
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./api/Dockerfile
    dockerContext: ./api
    healthCheckPath: /api/health
    autoDeploy: true

    envVars:
      - key: ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: PORT
        value: "8080"
      - key: BCRYPT_COST
        value: "12"
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 720h
      - key: EMAIL_PROVIDER
        value: resend
      - key: EMAIL_FROM
        value: Boa Club <noreply@clubedesportivoboa.fr>
      - key: FCM_CREDENTIALS_FILE
        value: /etc/secrets/firebase-admin-key.json
      - key: R2_BUCKET
        value: boa-club-uploads

      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: EMAIL_API_KEY
        sync: false
      # Cloudflare R2 — à remplir manuellement dans le dashboard Render.
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
