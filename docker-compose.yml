services:
  postgres:
    image: postgres:16-alpine
    container_name: boa-club-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: boa_club
      POSTGRES_USER: boa
      POSTGRES_PASSWORD: boa_dev_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boa -d boa_club"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: boa-club-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
